welcome-message=Your HUD/UI will hide automatically and only show up when "needed".\nOpen your character inventory to force everything to show up.\nLook up __REMARK_COLOR_BEGIN__Dynamic HUD__REMARK_COLOR_END__ in __REMARK_COLOR_BEGIN__Settings → Mod settings → Per player__REMARK_COLOR_END__ to customize some of the behavior.\nOr use __CONTROL__aglaron-dhud_activate__ to disable auto-hiding altogether.

[controls]
aglaron-dhud_activate=Activate/Deactivate UI hiding

[mod-setting-name]
aglaron-dhud_delay=Hiding delay, if applicable (seconds)
aglaron-dhud_hide-minimap=Auto-hide Minimap
aglaron-dhud_hide-quickbar=Auto-hide Quickbar
aglaron-dhud_show-quickbar-in-combat=Show Quickbar in combat

[mod-setting-description]
aglaron-dhud_delay=A time delay to wait before hiding an "unneeded" UI element. Not always a UI elemet is hidden with a delay. Some UI elements may sometimes be hidden immediately, when it makes more sense.
aglaron-dhud_hide-quickbar=Due to game limitations, while the quickbar is hidden quickbar hotkeys are unavailable.
aglaron-dhud_show-quickbar-in-combat=Remember that game prevents quickbar hotkeys from functioning when quickbar is hidden. It might be very frustrating to find that out in the heat of a battle.
