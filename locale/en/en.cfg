welcome-message=Parts of your HUD/UI will hide automatically and only show up when "needed".\nOpen your character inventory to force everything to show up.\nLook up __REMARK_COLOR_BEGIN__Dynamic HUD__REMARK_COLOR_END__ in __REMARK_COLOR_BEGIN__Settings → Mod settings → Per player__REMARK_COLOR_END__ to customize some of the behavior.\nOr use __CONTROL__dynamic-hud_activate__ to disable auto-hiding altogether.\n__REMARK_COLOR_BEGIN__IMPORTANT:__REMARK_COLOR_END__ If you have saves with hidden UI and you decide to uninstall this mod, remember to turn UI back on in those saves with __CONTROL__dynamic-hud_activate__ BEFORE uninstalling the mod. Otherwise hidden UI would not reappear.

[mod-description]
dynamic-hud=Hide all UI/HUD by default and then dynamically show only relevant parts of UI based on player's current in-game actions.\n\nShows minimap when you are driving, shows weapons when you are fighting, shows shortcuts when you are rewiring your combinators, and some more.\n\nHelps keeping your OLED safe from burn-ins as a bonus.

[controls]
dynamic-hud_activate=Activate/Deactivate UI hiding

[mod-setting-name]
dynamic-hud_delay=Hiding delay (when applicable, seconds)
dynamic-hud_hide-minimap=Minimap: auto-hide
dynamic-hud_show-minimap-while-driving=Minimap: show while driving
dynamic-hud_hide-quickbar=Quickbar: auto-hide
dynamic-hud_quickbar-workaround-enabled=Quickbar: immitate hotkeys (troubleshoot)
dynamic-hud_show-quickbar-on-use=Quickbar: show on use
dynamic-hud_show-quickbar-in-combat=Quickbar: show in combat
dynamic-hud_hide-alerts=Alerts: auto-hide
dynamic-hud_hide-top=Mods UI: auto-hide "top"
dynamic-hud_hide-left=Mods UI: auto-hide "left"
dynamic-hud_hide-goal=Objective: auto-hide (not working)

[mod-setting-description]
dynamic-hud_delay=A time delay to wait before hiding an "unneeded" UI element. In some cases UI elements will be hidden immediately when it makes more sense. In other cases, when a UI element is shown to indicate that it has changes, there will still be a meaningful minimum delay before hiding it, even with delay setting set to 0.
dynamic-hud_hide-quickbar=Caveat: quickbar hotkeys might have slightly different behavior when quickbar is hidden. See __REMARK_COLOR_BEGIN__Quickbar: immitate hotkeys__REMARK_COLOR_END__ setting description for details.
dynamic-hud_quickbar-workaround-enabled=As of v2.0.76, Factorio prevents quickbar hotkeys from functioning __REMARK_COLOR_BEGIN__when quickbar is hidden__REMARK_COLOR_END__ (expected to be fixed in Factorio v2.1). This mod tries to work around this issue by implementing its own quickbar hotkeys mechanism that immitates the original as close as possible. Unfortunately its not ideal. Most notable limitation: hotkeys will still not work for slots with blueprints, planners and remotes.\n\nIf you experience any game breaking issues with how quickbar hotkeys behave when quickbar is hidden, you can disable this custom immitation. In that case, turning on __REMARK_COLOR_BEGIN__Quickbar: show on use__REMARK_COLOR_END__ and __REMARK_COLOR_BEGIN__Quickbar: show in combat__REMARK_COLOR_END__ is recommended.
dynamic-hud_hide-alerts=This mod decides when to show the alerts panel by checking every few seconds if there were recent changes in active alerts. This approach has two implications:\n\n1. When a new alert is raised, the alerts panel might appear only after a couple of seconds delay.\n\n2. The Factorio API used for checking has a tiny computational cost, which scales up with the number of active alerts multiplied by the number of players in multiplayer (think thousands of entities missing construction materials in a full lobby). If you feel paranoid about your FPS/UPS, then you would probably want to disable this setting (for each player when in multiplayer).
dynamic-hud_hide-top="Top", aka "mod-gui", is the top-left panel of UI elements frequently used by Factorio mods to place some buttons or indicators. Think __REMARK_COLOR_BEGIN__Helmod__REMARK_COLOR_END__ or __REMARK_COLOR_BEGIN__Factory Planner__REMARK_COLOR_END__.
dynamic-hud_hide-left="Left" is the vertical UI area on the left edge of the screen, used by some (?) Factorio mods.
dynamic-hud_hide-goal=As of v2.0.76, Factorio doesn't hide the Objective popup when told to do so. The option is here in case API gets fixed in future Factorio versions.
