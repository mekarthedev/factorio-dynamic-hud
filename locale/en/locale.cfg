welcome-message=Parts of your HUD/UI will hide automatically and only show up when "needed".\nOpen your character inventory to force everything to show up.\nLook up __REMARK_COLOR_BEGIN__Dynamic HUD__REMARK_COLOR_END__ in __REMARK_COLOR_BEGIN__Settings → Mod settings → Per player__REMARK_COLOR_END__ to customize some of the behavior.\nOr use __CONTROL__aglaron-dhud_activate__ to disable auto-hiding altogether.\n__REMARK_COLOR_BEGIN__IMPORTANT:__REMARK_COLOR_END__ If you have saves with hidden UI and you decide to uninstall this mod, remember to turn UI back on in those saves with __CONTROL__aglaron-dhud_activate__ BEFORE uninstalling the mod. Otherwise hidden UI would not reappear.

[mod-description]
dynamic-hud=Hides all HUD/UI by default and then dynamically shows only relevant parts of UI based on your current in-game actions.\n\nShows minimap when you are driving, shows weapons when you are fighting, shows shortcuts when you are rewiring your combinators, and some more.\n\nHelps keeping your OLED safe from burn-ins as a bonus.

[controls]
aglaron-dhud_activate=Activate/Deactivate UI hiding

[mod-setting-name]
aglaron-dhud_delay=Hiding delay (when applicable, seconds)
aglaron-dhud_hide-minimap=Minimap: auto-hide
aglaron-dhud_show-minimap-while-driving=Minimap: show while driving
aglaron-dhud_hide-quickbar=Quickbar: auto-hide
aglaron-dhud_quickbar-workaround-enabled=Quickbar: immitate hotkeys (troubleshoot)
aglaron-dhud_show-quickbar-on-use=Quickbar: show on use
aglaron-dhud_show-quickbar-in-combat=Quickbar: show in combat
aglaron-dhud_hide-top=Mods UI: auto-hide "top"
aglaron-dhud_hide-left=Mods UI: auto-hide "left"
aglaron-dhud_hide-goal=Objective: auto-hide (not working)

[mod-setting-description]
aglaron-dhud_delay=A time delay to wait before hiding an "unneeded" UI element. Not always a UI elemet is hidden with a delay. Some UI elements may sometimes be hidden immediately, when it makes more sense.
aglaron-dhud_hide-quickbar=Caveat: quickbar hotkeys might have slightly different behavior when quickbar is hidden. See __REMARK_COLOR_BEGIN__Quickbar: immitate hotkeys__REMARK_COLOR_END__ setting description for details.
aglaron-dhud_quickbar-workaround-enabled=As of v2.0.76, Factorio prevents quickbar hotkeys from functioning __REMARK_COLOR_BEGIN__when quickbar is hidden__REMARK_COLOR_END__ (expected to be fixed in Factorio v2.1). This mod tries to work around this issue by implementing its own quickbar hotkeys mechanism that immitates the original as close as possible. Unfortunately its not ideal. Most notable limitation: hotkeys will still not work for slots with blueprints, planners and remotes.\n\nIf you experience any game breaking issues with how quickbar hotkeys behave when quickbar is hidden, you can disable this custom immitation. In that case, turning on __REMARK_COLOR_BEGIN__Quickbar: show on use__REMARK_COLOR_END__ and __REMARK_COLOR_BEGIN__Quickbar: show in combat__REMARK_COLOR_END__ is recommended.
aglaron-dhud_hide-top="Top", aka "mod-gui", is the top-left panel of UI elements frequently used by Factorio mods to place some buttons or indicators. Think __REMARK_COLOR_BEGIN__Helmod__REMARK_COLOR_END__ or __REMARK_COLOR_BEGIN__Factory Planner__REMARK_COLOR_END__.
aglaron-dhud_hide-left="Left" is the vertical UI area on the left edge of the screen, used by some (?) Factorio mods.
aglaron-dhud_hide-goal=As of v2.0.76, Factorio doesn't hide the Objective popup when told to do so. The option is here in case API gets fixed in future Factorio versions.
